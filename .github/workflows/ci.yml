name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify SEO (index.html ↔ site.json)
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist SEO
        run: node scripts/verify-seo.mjs --dist
